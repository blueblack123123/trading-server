services:
  db:
    image: postgres:17-alpine
    container_name: trading-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  migrate:
    build: .
    command: ["/app/.venv/bin/alembic", "upgrade", "head"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://trading:trading@db:5432/trading
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    container_name: trading-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://trading:trading@db:5432/trading
    volumes:
      - ./config:/app/config
      - ./external:/app/external
    depends_on:
      migrate:
        condition: service_completed_successfully

  history-worker:
    build: .
    container_name: trading-history-worker
    restart: unless-stopped
    command: ["/app/.venv/bin/python", "-m", "app.modules.history.worker"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://trading:trading@db:5432/trading
    volumes:
      - ./config:/app/config
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres-data:
